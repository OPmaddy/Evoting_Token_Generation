{% extends "layout.html" %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2>🔒 Security Settings</h2>
</div>

<div class="card" style="max-width: 500px;">
    <h3>Change Admin Password</h3>
    <form action="/admin/change_password" method="POST" style="margin-top: 1.5rem;">
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Current Password</label>
            <input type="password" name="old_password" required style="width: 100%; padding: 0.75rem; background: var(--bg-color); border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">New Password</label>
            <input type="password" name="new_password" required style="width: 100%; padding: 0.75rem; background: var(--bg-color); border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box;">
        </div>
        <button type="submit" class="btn btn-warning" style="background-color: var(--warning); color: var(--bg-color); width: 100%; padding: 1rem; font-size: 1.1rem;">UPDATE PASSWORD</button>
    </form>
</div>

<script>
    const navElem = document.getElementById('nav-password');
    if (navElem) navElem.classList.add('active');
</script>
{% endblock %}
