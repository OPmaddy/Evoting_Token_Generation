{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h2>🚀 Initialize New Election</h2>
    <p style="color: var(--text-secondary)">Setting up a new election will wipe the current state and generate new credentials.</p>
    
    <form action="/admin/init" method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem;">Electoral Roll (CSV)</label>
                <input type="file" name="electoral_roll" name="electoral_roll" accept=".csv" required style="width: 100%; padding: 0.5rem; background: var(--bg-color); border: 1px solid #334155; color: white;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem;">BMD Keys (JSON)</label>
                <input type="file" name="bmd_keys" accept=".json" required style="width: 100%; padding: 0.5rem; background: var(--bg-color); border: 1px solid #334155; color: white;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem;">Total TGen Devices</label>
                <input type="number" id="num_tgens" name="num_tgens" min="1" max="20" value="1" required style="width: 100%; padding: 0.5rem; background: var(--bg-color); border: 1px solid #334155; color: white;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem;">Suggested End Time</label>
                <input type="datetime-local" name="end_time" required style="width: 100%; padding: 0.5rem; background: var(--bg-color); border: 1px solid #334155; color: white;">
            </div>
        </div>
        
        <div style="margin-top: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Election Name / Identifier</label>
            <input type="text" name="election_name" required placeholder="e.g. Mayoral Election 2026 Phase 1" style="width: 100%; padding: 0.5rem; background: var(--bg-color); border: 1px solid #334155; color: white; display: block;">
        </div>


        <div style="margin-top: 2rem;">
            <h3>Station Configuration</h3>
            <p style="color: var(--text-secondary)">Define which BMD IDs are allowed for each Token Generation device.</p>
            <div id="device_configs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;"></div>
        </div>

        <div style="margin-top: 3rem; text-align: right;">
            <button type="submit" class="btn btn-success" style="font-size: 1.1rem; padding: 1rem 3rem;">GENERATE & START ELECTION</button>
        </div>
    </form>
</div>

<script>
const numTgensInput = document.getElementById('num_tgens');
const deviceConfigsContainer = document.getElementById('device_configs');

function updateDeviceRows() {
    const n = parseInt(numTgensInput.value);
    deviceConfigsContainer.innerHTML = '';
    for (let i = 1; i <= n; i++) {
        const div = document.createElement('div');
        div.className = 'card';
        div.style.marginBottom = '0';
        div.innerHTML = `
            <h4 style="margin-top:0">Device ${i}</h4>
            <label style="font-size: 0.8rem; color: var(--text-secondary)">Allowed BMD IDs (comma separated, e.g. 1,2,5)</label>
            <input type="text" name="bmd_mapping_${i}" value="${i}" placeholder="1, 2, 3" style="width: 100%; padding: 0.5rem; background: var(--bg-color); border: 1px solid #334155; color: white; margin-top:0.5rem">
        `;
        deviceConfigsContainer.appendChild(div);
    }
}

numTgensInput.addEventListener('input', updateDeviceRows);
updateDeviceRows();
document.getElementById('nav-init').classList.add('active');
</script>
{% endblock %}
